<!-- extension/popup.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IntelliPlan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      min-height: 500px;
      max-height: 600px;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #f0f6ff;
      color: #0f172a;
      overflow-y: auto;
    }

    .header {
      background: white;
      border-bottom: 1px solid #e2eaf5;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1rem;
      font-weight: 700;
      color: #0f172a;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .logo span { color: #3b82f6; }

    .open-btn {
      font-size: 0.72rem;
      padding: 4px 10px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .tabs {
      display: flex;
      background: white;
      border-bottom: 1px solid #e2eaf5;
    }

    .tab {
      flex: 1;
      padding: 8px;
      border: none;
      background: none;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      color: #94a3b8;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }

    .tab.active {
      color: #3b82f6;
      border-bottom-color: #3b82f6;
    }

    .content { padding: 12px; }

    .section-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 8px;
      margin-top: 12px;
    }

    .section-label:first-child { margin-top: 0; }

    .task-card {
      background: white;
      border: 1px solid #e2eaf5;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 6px;
      border-left: 3px solid #e2eaf5;
      transition: transform 0.15s;
    }

    .task-card:hover { transform: translateY(-1px); }
    .task-card.high { border-left-color: #ef4444; }
    .task-card.medium { border-left-color: #f59e0b; }
    .task-card.low { border-left-color: #22c55e; }
    .task-card.missing { border-left-color: #ef4444; background: #fef2f2; }

    .task-title {
      font-size: 0.82rem;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .task-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .pill {
      font-size: 0.62rem;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 6px;
    }

    .pill.due { background: #dbeafe; color: #3b82f6; }
    .pill.high { background: #fef2f2; color: #ef4444; }
    .pill.medium { background: #fffbeb; color: #f59e0b; }
    .pill.low { background: #f0fdf4; color: #22c55e; }
    .pill.course { background: #f1f5f9; color: #64748b; }
    .pill.missing { background: #fef2f2; color: #ef4444; }

    .block-card {
      background: white;
      border: 1px solid #e2eaf5;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 6px;
      display: flex;
      gap: 10px;
      align-items: center;
      border-left: 3px solid #3b82f6;
    }

    .block-time {
      font-size: 0.7rem;
      font-weight: 700;
      color: #3b82f6;
      min-width: 70px;
    }

    .block-info { flex: 1; }

    .block-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: #0f172a;
    }

    .block-course {
      font-size: 0.7rem;
      color: #94a3b8;
    }

    .block-dur {
      font-size: 0.68rem;
      background: #f1f5f9;
      color: #64748b;
      padding: 2px 6px;
      border-radius: 6px;
      font-weight: 600;
    }

    .empty {
      text-align: center;
      padding: 2rem 1rem;
      color: #94a3b8;
      font-size: 0.82rem;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: #94a3b8;
      font-size: 0.82rem;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #e2eaf5;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .not-connected {
      text-align: center;
      padding: 2rem 1rem;
    }

    .not-connected p {
      font-size: 0.82rem;
      color: #64748b;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .connect-btn {
      padding: 10px 20px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      width: 100%;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 12px;
    }

    .stat-box {
      background: white;
      border: 1px solid #e2eaf5;
      border-radius: 10px;
      padding: 8px;
      text-align: center;
    }

    .stat-num {
      font-size: 1.2rem;
      font-weight: 700;
      color: #0f172a;
    }

    .stat-lbl {
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #94a3b8;
    }

    .grade-row {
      background: white;
      border: 1px solid #e2eaf5;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .grade-name {
      flex: 1;
      font-size: 0.8rem;
      font-weight: 600;
      color: #0f172a;
    }

    .grade-badge {
      font-size: 0.88rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 8px;
    }

    .grade-bar-wrap {
      height: 4px;
      background: #e2eaf5;
      border-radius: 2px;
      margin-top: 4px;
      overflow: hidden;
    }

    .grade-bar {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <div class="logo-icon">📅</div>
      Intelli<span>Plan</span>
    </div>
    <button class="open-btn" id="openAppBtn">Open App ↗</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="tasks">📋 Tasks</button>
    <button class="tab" data-tab="schedule">📅 Today</button>
    <button class="tab" data-tab="grades">📊 Grades</button>
  </div>

  <div class="content" id="content">
    <div class="loading">
      <div class="spinner"></div>
      Loading...
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
