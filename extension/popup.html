<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IntelliPlan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      min-height: 540px;
      max-height: 680px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f6ff;
      color: #0f172a;
      overflow-y: auto;
    }

    .header {
      background: white;
      border-bottom: 1px solid #e2eaf5;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1rem;
      font-weight: 700;
      color: #0f172a;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .logo span { color: #3b82f6; }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .small-btn {
      font-size: 0.72rem;
      padding: 5px 10px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .ghost-btn {
      font-size: 0.72rem;
      padding: 5px 10px;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #dbeafe;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .tabs {
      display: flex;
      background: white;
      border-bottom: 1px solid #e2eaf5;
    }

    .tab {
      flex: 1;
      padding: 8px;
      border: none;
      background: none;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      color: #94a3b8;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }

    .tab.active {
      color: #3b82f6;
      border-bottom-color: #3b82f6;
    }

    .content { padding: 12px; }

    .section-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 8px;
      margin-top: 12px;
    }

    .section-label:first-child { margin-top: 0; }

    .task-card {
      background: white;
      border: 1px solid #e2eaf5;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 6px;
      border-left: 3px solid #e2eaf5;
      transition: transform 0.15s;
    }

    .task-card:hover { transform: translateY(-1px); }
    .task-card.high { border-left-color: #ef4444; }
    .task-card.medium { border-left-color: #f59e0b; }
    .task-card.low { border-left-color: #22c55e; }
    .task-card.missing { border-left-color: #ef4444; background: #fef2f2; }

    .task-title {
      font-size: 0.82rem;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .task-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .pill {
      font-size: 0.62rem;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 6px;
    }

    .pill.due { background: #dbeafe; color: #3b82f6; }
    .pill.high { background: #fef2f2; color: #ef4444; }
    .pill.medium { background: #fffbeb; color: #f59e0b; }
    .pill.low { background: #f0fdf4; color: #22c55e; }
    .pill.course { background: #f1f5f9; color: #64748b; }
    .pill.missing { background: #fef2f2; color: #ef4444; }

    .block-card {
      background: white;
      border: 1px solid #e2eaf5;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 6px;
      display: flex;
      gap: 10px;
      align-items: center;
      border-left: 3px solid #3b82f6;
    }

    .block-time {
      font-size: 0.7rem;
      font-weight: 700;
      color: #3b82f6;
      min-width: 70px;
    }

    .block-info { flex: 1; }

    .block-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: #0f172a;
    }

    .block-course {
      font-size: 0.7rem;
      color: #94a3b8;
    }

    .block-dur {
      font-size: 0.68rem;
      background: #f1f5f9;
      color: #64748b;
      padding: 2px 6px;
      border-radius: 6px;
      font-weight: 600;
    }

    .empty {
      text-align: center;
      padding: 2rem 1rem;
      color: #94a3b8;
      font-size: 0.82rem;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: #94a3b8;
      font-size: 0.82rem;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #e2eaf5;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .card {
      background: white;
      border: 1px solid #e2eaf5;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
    }

    .auth-wrap {
      display: grid;
      gap: 12px;
    }

    .auth-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .auth-title {
      font-size: 1rem;
      font-weight: 700;
      color: #0f172a;
    }

    .auth-sub {
      font-size: 0.78rem;
      color: #64748b;
      margin-top: 4px;
      line-height: 1.45;
    }

    .seg {
      display: flex;
      background: #eff6ff;
      border: 1px solid #dbeafe;
      border-radius: 10px;
      padding: 3px;
    }

    .seg button {
      flex: 1;
      border: none;
      background: transparent;
      padding: 8px;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      color: #64748b;
    }

    .seg button.active {
      background: white;
      color: #1d4ed8;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }

    .field label {
      font-size: 0.72rem;
      font-weight: 700;
      color: #334155;
    }

    .field input {
      width: 100%;
      border: 1px solid #dbeafe;
      border-radius: 10px;
      padding: 10px 11px;
      font-size: 0.85rem;
      outline: none;
      background: white;
      color: #0f172a;
    }

    .field input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    .primary-btn {
      width: 100%;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: white;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 0.86rem;
      font-weight: 700;
      cursor: pointer;
    }

    .link-btn {
      border: none;
      background: transparent;
      color: #2563eb;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.78rem;
      padding: 0;
    }

    .muted {
      color: #64748b;
      font-size: 0.78rem;
      line-height: 1.45;
    }

    .status {
      font-size: 0.78rem;
      margin-top: 10px;
      color: #64748b;
    }

    .status.error { color: #dc2626; }
    .status.ok { color: #16a34a; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <div class="logo-icon">📅</div>
      Intelli<span>Plan</span>
    </div>
    <div class="header-actions">
      <button class="ghost-btn hidden" id="logoutBtn">Logout</button>
      <button class="small-btn" id="openAppBtn">Open App ↗</button>
    </div>
  </div>

  <div id="authView" class="content">
    <div class="card auth-wrap">
      <div>
        <div class="auth-top">
          <div>
            <div class="auth-title">Sign in to IntelliPlan</div>
            <div class="auth-sub">Use your IntelliPlan account to load tasks, schedule, and grades inside the extension.</div>
          </div>
        </div>
      </div>

      <div class="seg" role="tablist" aria-label="Authentication mode">
        <button id="loginModeBtn" class="active" type="button">Login</button>
        <button id="signupModeBtn" type="button">Sign up</button>
      </div>

      <form id="authForm">
        <div id="nameField" class="field hidden">
          <label for="nameInput">Name</label>
          <input id="nameInput" type="text" autocomplete="name" placeholder="Your name" />
        </div>

        <div class="field">
          <label for="emailInput">Email</label>
          <input id="emailInput" type="email" autocomplete="email" placeholder="you@example.com" required />
        </div>

        <div class="field">
          <label for="passwordInput">Password</label>
          <input id="passwordInput" type="password" autocomplete="current-password" placeholder="••••••••" required />
        </div>

        <button id="authSubmitBtn" class="primary-btn" type="submit">Login</button>
      </form>

      <div class="muted">
        This is a normal extension sign-in flow. It stores the session in the extension, not in the page.
      </div>

      <div id="authStatus" class="status"></div>
    </div>
  </div>

  <div id="appView" class="hidden">
    <div class="tabs">
      <button class="tab active" data-tab="tasks" type="button">📋 Tasks</button>
      <button class="tab" data-tab="schedule" type="button">📅 Today</button>
      <button class="tab" data-tab="grades" type="button">📊 Grades</button>
    </div>

    <div class="content" id="content">
      <div class="loading">
        <div class="spinner"></div>
        Loading...
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
