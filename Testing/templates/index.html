<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IntelliPlan</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root[data-theme="light"] {
      --bg: #f0f6ff;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --accent: #3b82f6;
      --accent-soft: #dbeafe;
      --accent-mid: #93c5fd;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border: #e2eaf5;
      --shadow: 0 4px 24px rgba(59,130,246,0.08);
      --shadow-hover: 0 8px 32px rgba(59,130,246,0.16);
      --high: #ef4444;
      --high-bg: #fef2f2;
      --medium: #f59e0b;
      --medium-bg: #fffbeb;
      --low: #22c55e;
      --low-bg: #f0fdf4;
      --toggle-bg: #dbeafe;
      --toggle-knob: #3b82f6;
    }

    :root[data-theme="dark"] {
      --bg: #0d1117;
      --bg-secondary: #161b22;
      --bg-card: #1c2333;
      --accent: #4d9ef7;
      --accent-soft: #1a2d4a;
      --accent-mid: #2563eb;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #484f58;
      --border: #21262d;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --shadow-hover: 0 8px 32px rgba(77,158,247,0.15);
      --high: #f87171;
      --high-bg: #2a1515;
      --medium: #fbbf24;
      --medium-bg: #2a2010;
      --low: #4ade80;
      --low-bg: #0f2a1a;
      --toggle-bg: #1a2d4a;
      --toggle-knob: #4d9ef7;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      transition: background 0.3s ease, color 0.3s ease;
    }

    /* ── HEADER ── */
    header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 12px rgba(0,0,0,0.06);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .logo-text span {
      color: var(--accent);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .date-badge {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--accent-soft);
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* ── DARK MODE TOGGLE ── */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .toggle {
      position: relative;
      width: 48px;
      height: 26px;
      cursor: pointer;
    }

    .toggle input { display: none; }

    .toggle-track {
      width: 100%;
      height: 100%;
      background: var(--toggle-bg);
      border-radius: 13px;
      transition: background 0.3s;
      border: 1px solid var(--border);
    }

    .toggle-knob {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      background: var(--toggle-knob);
      border-radius: 50%;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .toggle input:checked ~ .toggle-knob {
      transform: translateX(22px);
    }

    /* ── MAIN LAYOUT ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    /* ── PAGE TITLE ── */
    .page-header {
      margin-bottom: 2rem;
      animation: fadeUp 0.5s ease both;
    }

    .page-title {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--text-primary);
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }

    .page-subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* ── STATS BAR ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .stat-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .stat-info { flex: 1; }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1;
      margin-bottom: 2px;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      animation: fadeUp 0.5s 0.2s ease both;
    }

    .filter-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* ── ASSIGNMENT CARDS ── */
    .assignments-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .assignment-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.3s ease;
      animation: fadeUp 0.4s ease both;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .assignment-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      border-radius: 4px 0 0 4px;
    }

    .assignment-card.high::before { background: var(--high); }
    .assignment-card.medium::before { background: var(--medium); }
    .assignment-card.low::before { background: var(--low); }

    .assignment-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }

    .assignment-card.hidden {
      display: none;
    }

    /* ── RANK BUBBLE ── */
    .rank-bubble {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ── CARD CONTENT ── */
    .card-main { flex: 1; min-width: 0; }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    .meta-item svg {
      width: 12px;
      height: 12px;
      opacity: 0.6;
    }

    /* ── PRIORITY BADGE ── */
    .priority-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .priority-badge.high { background: var(--high-bg); color: var(--high); }
    .priority-badge.medium { background: var(--medium-bg); color: var(--medium); }
    .priority-badge.low { background: var(--low-bg); color: var(--low); }

    /* ── TIME PILL ── */
    .time-pill {
      background: var(--accent-soft);
      color: var(--accent);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
      display: none;
    }

    .empty-state.visible { display: block; }

    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }

    .empty-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── LOADING ── */
    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .stats-bar { grid-template-columns: 1fr; }
      .time-pill { display: none; }
      header { padding: 0 1rem; }
      main { padding: 1.5rem 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📅</div>
    <span class="logo-text">Intelli<span>Plan</span></span>
  </div>
  <div class="header-right">
    <span class="date-badge" id="dateBadge"></span>
    <label class="toggle" title="Toggle dark mode">
      <input type="checkbox" id="themeToggle" />
      <div class="toggle-track"></div>
      <div class="toggle-knob"></div>
    </label>
    <span class="toggle-wrap" style="font-size:0.75rem; color: var(--text-muted);" id="themeLabel">Light</span>
  </div>
</header>

<main>
  <div class="page-header">
    <h1 class="page-title">Your Study Schedule</h1>
    <p class="page-subtitle">Assignments sorted by priority and due date</p>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-card">
      <div class="stat-icon" style="background:#fef2f2;">🔴</div>
      <div class="stat-info">
        <div class="stat-value" id="statHigh">—</div>
        <div class="stat-label">High Priority</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:#fffbeb;">🟡</div>
      <div class="stat-info">
        <div class="stat-value" id="statMedium">—</div>
        <div class="stat-label">Medium Priority</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:#f0fdf4;">🟢</div>
      <div class="stat-info">
        <div class="stat-value" id="statLow">—</div>
        <div class="stat-label">Low Priority</div>
      </div>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="high">🔴 High</button>
    <button class="filter-btn" data-filter="medium">🟡 Medium</button>
    <button class="filter-btn" data-filter="low">🟢 Low</button>
  </div>

  <div id="assignmentsList" class="assignments-list">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading your schedule...</p>
    </div>
  </div>

  <div class="empty-state" id="emptyState">
    <div class="empty-icon">✅</div>
    <div class="empty-title">No assignments here</div>
    <p>Try a different filter</p>
  </div>
</main>

<script>
  // ── THEME TOGGLE ──
  const toggle = document.getElementById('themeToggle');
  const label  = document.getElementById('themeLabel');
  const html   = document.documentElement;

  const saved = localStorage.getItem('theme') || 'light';
  html.setAttribute('data-theme', saved);
  toggle.checked = saved === 'dark';
  label.textContent = saved === 'dark' ? 'Dark' : 'Light';

  toggle.addEventListener('change', () => {
    const theme = toggle.checked ? 'dark' : 'light';
    html.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    label.textContent = theme === 'dark' ? 'Dark' : 'Light';
  });

  // ── DATE BADGE ──
  const dateBadge = document.getElementById('dateBadge');
  const today = new Date();
  dateBadge.textContent = today.toLocaleDateString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric'
  });

  // ── FORMAT HELPERS ──
  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function formatTime(mins) {
    if (mins < 60) return `${mins}m`;
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    return m ? `${h}h ${m}m` : `${h}h`;
  }

  function daysUntil(dateStr) {
    const due  = new Date(dateStr + 'T00:00:00');
    const now  = new Date(); now.setHours(0,0,0,0);
    const diff = Math.round((due - now) / 86400000);
    if (diff < 0)  return '⚠️ Overdue';
    if (diff === 0) return '📌 Due today';
    if (diff === 1) return '⏰ Due tomorrow';
    return `📅 ${diff} days left`;
  }

  // ── RENDER CARDS ──
  let allAssignments = [];

  function renderCards(assignments) {
    const list = document.getElementById('assignmentsList');
    const empty = document.getElementById('emptyState');
    list.innerHTML = '';

    if (!assignments.length) {
      empty.classList.add('visible');
      return;
    }
    empty.classList.remove('visible');

    assignments.forEach((a, i) => {
      const priority = a.priority.toLowerCase();
      const card = document.createElement('div');
      card.className = `assignment-card ${priority}`;
      card.style.animationDelay = `${i * 0.07}s`;
      card.dataset.priority = priority;

      card.innerHTML = `
        <div class="rank-bubble">#${i + 1}</div>
        <div class="card-main">
          <div class="card-title">${a.title}</div>
          <div class="card-meta">
            <span class="meta-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5M2 12l10 5 10-5"/>
              </svg>
              ${a.course}
            </span>
            <span class="meta-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              ${formatDate(a.due_date)}
            </span>
            <span class="meta-item">${daysUntil(a.due_date)}</span>
          </div>
        </div>
        <span class="time-pill">⏱ ${formatTime(a.estimated_time)}</span>
        <span class="priority-badge ${priority}">${a.priority}</span>
      `;
      list.appendChild(card);
    });
  }

  // ── STATS ──
  function updateStats(assignments) {
    document.getElementById('statHigh').textContent =
      assignments.filter(a => a.priority.toLowerCase() === 'high').length;
    document.getElementById('statMedium').textContent =
      assignments.filter(a => a.priority.toLowerCase() === 'medium').length;
    document.getElementById('statLow').textContent =
      assignments.filter(a => a.priority.toLowerCase() === 'low').length;
  }

  // ── FILTERS ──
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const filter = btn.dataset.filter;
      const filtered = filter === 'all'
        ? allAssignments
        : allAssignments.filter(a => a.priority.toLowerCase() === filter);
      renderCards(filtered);
    });
  });

  // ── FETCH FROM FLASK ──
  fetch('/schedule')
    .then(r => r.json())
    .then(data => {
      allAssignments = data;
      updateStats(data);
      renderCards(data);
    })
    .catch(() => {
      document.getElementById('assignmentsList').innerHTML =
        '<div class="loading"><p>⚠️ Could not connect to backend. Make sure Flask is running.</p></div>';
    });
</script>
</body>
</html>
