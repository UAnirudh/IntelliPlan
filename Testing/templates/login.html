{% extends "base.html" %}

{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-icon" style="width:48px;height:48px;font-size:24px;margin:0 auto 1rem;">📅</div>
      <h1 class="login-title">Welcome back</h1>
      <p class="login-subtitle">Sign in to your IntelliPlan account</p>
    </div>

    <div class="login-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" placeholder="you@school.edu" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" placeholder="••••••••" />
      </div>
      <button class="btn-primary" style="width:100%;padding:14px;border:none;cursor:pointer;font-size:0.95rem;">
        Sign In
      </button>
    </div>

    <div class="login-footer">
      <p>Don't have an account? <a href="#" class="login-link">Sign up free</a></p>
    </div>
  </div>
</div>
{% endblock %}
