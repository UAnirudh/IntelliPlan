<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IntelliPlan</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root[data-theme="light"] {
      --bg: #f0f6ff;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --accent: #3b82f6;
      --accent-soft: #dbeafe;
      --accent-mid: #93c5fd;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border: #e2eaf5;
      --shadow: 0 4px 24px rgba(59,130,246,0.08);
      --shadow-hover: 0 8px 32px rgba(59,130,246,0.16);
      --high: #ef4444;
      --high-bg: #fef2f2;
      --medium: #f59e0b;
      --medium-bg: #fffbeb;
      --low: #22c55e;
      --low-bg: #f0fdf4;
      --toggle-bg: #dbeafe;
      --toggle-knob: #3b82f6;
    }

    :root[data-theme="dark"] {
      --bg: #0d1117;
      --bg-secondary: #161b22;
      --bg-card: #1c2333;
      --accent: #4d9ef7;
      --accent-soft: #1a2d4a;
      --accent-mid: #2563eb;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #484f58;
      --border: #21262d;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --shadow-hover: 0 8px 32px rgba(77,158,247,0.15);
      --high: #f87171;
      --high-bg: #2a1515;
      --medium: #fbbf24;
      --medium-bg: #2a2010;
      --low: #4ade80;
      --low-bg: #0f2a1a;
      --toggle-bg: #1a2d4a;
      --toggle-knob: #4d9ef7;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      transition: background 0.3s ease, color 0.3s ease;
    }

    header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 12px rgba(0,0,0,0.06);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .logo-text span { color: var(--accent); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .date-badge {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--accent-soft);
      padding: 4px 12px;
      border-radius: 20px;
    }

    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .toggle {
      position: relative;
      width: 48px;
      height: 26px;
      cursor: pointer;
    }

    .toggle input { display: none; }

    .toggle-track {
      width: 100%;
      height: 100%;
      background: var(--toggle-bg);
      border-radius: 13px;
      transition: background 0.3s;
      border: 1px solid var(--border);
    }

    .toggle-knob {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      background: var(--toggle-knob);
      border-radius: 50%;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .toggle input:checked ~ .toggle-knob { transform: translateX(22px); }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    .page-header {
      margin-bottom: 2rem;
      animation: fadeUp 0.5s ease both;
    }

    .page-title {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--text-primary);
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }

    .page-subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .stat-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .stat-info { flex: 1; }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1;
      margin-bottom: 2px;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      animation: fadeUp 0.5s 0.2s ease both;
    }

    .filter-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .assignments-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .assignment-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.3s ease;
      animation: fadeUp 0.4s ease both;
      cursor: pointer;
      position: relative;
    }

    .assignment-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      border-radius: 4px 0 0 4px;
    }

    .assignment-card.high::before { background: var(--high); }
    .assignment-card.medium::before { background: var(--medium); }
    .assignment-card.low::before { background: var(--low); }

    .assignment-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }

    .assignment-card.hidden { display: none; }

    .rank-bubble {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-main { flex: 1; min-width: 0; }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    .priority-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .priority-badge.high { background: var(--high-bg); color: var(--high); }
    .priority-badge.medium { background: var(--medium-bg); color: var(--medium); }
    .priority-badge.low { background: var(--low-bg); color: var(--low); }

    .time-pill {
      background: var(--accent-soft);
      color: var(--accent);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
      display: none;
    }

    .empty-state.visible { display: block; }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }

    .empty-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── NAV TABS ── */
    .nav-tabs {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .nav-tab {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    .nav-tab:hover {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .nav-tab.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    @media (max-width: 600px) {
      .stats-bar { grid-template-columns: 1fr; }
      .time-pill { display: none; }
      header { padding: 0 1rem; }
      main { padding: 1.5rem 1rem; }
    }
    
    /* ── DROPDOWN ── */
    .dropdown-wrap {
        position: relative;
        display: inline-block;
        animation: fadeUp 0.5s ease both;
}

    .dropdown-btn {
        padding: 10px 20px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--bg-card);
        color: var(--text-primary);
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        font-family: 'DM Sans', sans-serif;
        display: flex;
        align-items: center;
        gap: 8px;
        box-shadow: var(--shadow);
        transition: all 0.2s;
    }

    .dropdown-btn:hover {
        box-shadow: var(--shadow-hover);
        border-color: var(--accent);
    }

    .chevron {
        font-size: 0.75rem;
        color: var(--text-muted);
        transition: transform 0.2s;
    }

    .dropdown-menu {
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: var(--shadow-hover);
        min-width: 180px;
        overflow: hidden;
        display: none;
        z-index: 200;
        animation: fadeUp 0.2s ease both;
    }

    .dropdown-menu.open { display: block; }

    .dropdown-item {
        padding: 10px 16px;
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 0.15s;
    }

    .dropdown-item:hover {
        background: var(--accent-soft);
        color: var(--accent);
    }

    .dropdown-item.active {
        background: var(--accent-soft);
        color: var(--accent);
        font-weight: 600;
    }
    .dropdown-wrap {
        position: relative;
        display: inline-block;
        animation: fadeUp 0.5s ease both;
        z-index: 300;
        }

    .assignments-list {
        position: relative;
        z-index: 1;
        }

    .assignment-card {
        position: relative;
        z-index: 1;
        }
    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 5rem 1rem 4rem;
      animation: fadeUp 0.6s ease both;
    }

    .hero-badge {
      display: inline-block;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 1.5rem;
      letter-spacing: 0.03em;
    }

    .hero-title {
      font-family: 'DM Serif Display', serif;
      font-size: 3.5rem;
      color: var(--text-primary);
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 1.25rem;
    }

    .hero-subtitle {
      font-size: 1.1rem;
      color: var(--text-secondary);
      max-width: 560px;
      margin: 0 auto 2.5rem;
      line-height: 1.7;
      font-weight: 400;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      padding: 14px 32px;
      background: var(--accent);
      color: white;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(59,130,246,0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(59,130,246,0.4);
    }

    .btn-secondary {
      padding: 14px 32px;
      background: var(--bg-card);
      color: var(--text-primary);
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    /* ── FEATURES ── */
    .features {
      padding: 4rem 0;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .features-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .features-title {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .features-subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
    }

    .feature-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem 1.5rem;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .feature-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .feature-icon {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    .feature-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .feature-desc {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.6;
      font-weight: 400;
    }

    /* ── CTA SECTION ── */
    .cta-section {
      text-align: center;
      padding: 4rem 1rem;
      background: var(--accent-soft);
      border-radius: 20px;
      margin: 2rem 0 4rem;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .cta-title {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    .cta-subtitle {
      font-size: 0.95rem;
      color: var(--text-secondary);
      margin-bottom: 2rem;
      font-weight: 400;
    }

    @media (max-width: 600px) {
      .hero-title { font-size: 2.5rem; }
      .features-grid { grid-template-columns: 1fr; }
    }
    /* ── LOGIN ── */
    .login-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 70vh;
      animation: fadeUp 0.5s ease both;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-hover);
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.75rem;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }

    .login-subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-size: 0.825rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
    }

    .form-input {
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-primary);
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .login-link {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }

    .login-link:hover {
      text-decoration: underline;
    }
    .login-error {
      background: var(--high-bg);
      color: var(--high);
      border: 1px solid var(--high);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 1.25rem;
    }

    .form-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 400;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📅</div>
    <span class="logo-text">Intelli<span>Plan</span></span>
  </div>
  <div class="header-right">
    <nav class="nav-tabs">
      <a href="/" class="nav-tab {% if active_page == 'landing' %}active{% endif %}">Home</a>
      <a href="/schedule" class="nav-tab {% if active_page == 'home' %}active{% endif %}">Schedule</a>
      <a href="/priority" class="nav-tab {% if active_page == 'priority' %}active{% endif %}">Priority</a>
      <a href="/classes" class="nav-tab {% if active_page == 'classes' %}active{% endif %}">Classes</a>
      <a href="/login" class="nav-tab {% if active_page == 'login' %}active{% endif %}">Login</a>
      <a href="/logout" class="nav-tab">Logout</a>
    </nav>
    <span class="date-badge" id="dateBadge"></span>
    <label class="toggle" title="Toggle dark mode">
      <input type="checkbox" id="themeToggle" />
      <div class="toggle-track"></div>
      <div class="toggle-knob"></div>
    </label>
    <span style="font-size:0.75rem; color: var(--text-muted);" id="themeLabel">Light</span>
  </div>
</header>

<main>
  {% block content %}{% endblock %}
</main>

<script>
  const toggle = document.getElementById('themeToggle');
  const label  = document.getElementById('themeLabel');
  const html   = document.documentElement;

  const saved = localStorage.getItem('theme') || 'light';
  html.setAttribute('data-theme', saved);
  toggle.checked = saved === 'dark';
  label.textContent = saved === 'dark' ? 'Dark' : 'Light';

  toggle.addEventListener('change', () => {
    const theme = toggle.checked ? 'dark' : 'light';
    html.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    label.textContent = theme === 'dark' ? 'Dark' : 'Light';
  });

  const dateBadge = document.getElementById('dateBadge');
  const today = new Date();
  dateBadge.textContent = today.toLocaleDateString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric'
  });

  {% block scripts %}{% endblock %}
</script>

</body>
</html>
