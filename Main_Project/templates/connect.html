{% extends "base.html" %}
{% block content %}
<div class="login-wrap">
  <div class="login-card" style="max-width:480px;">
    <div class="login-header">
      <div style="font-size:2rem; margin-bottom:0.75rem;">🔗</div>
      <h1 class="login-title">Connect your school</h1>
      <p class="login-subtitle">Link your LMS so IntelliPlan can pull your assignments</p>
    </div>
    <div style="display:flex; flex-direction:column; gap:12px; margin-bottom:1.5rem;">
      <a href="/login/canvas" style="display:flex;align-items:center;gap:14px;padding:16px 20px;border-radius:14px;border:1px solid var(--border);background:var(--bg-card);text-decoration:none;color:var(--text-primary);box-shadow:var(--shadow);transition:all 0.2s;"
        onmouseover="this.style.borderColor='#e66000'" onmouseout="this.style.borderColor='var(--border)'">
        <div style="width:42px;height:42px;border-radius:10px;background:#e66000;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">🟥</div>
        <div>
          <div style="font-size:0.95rem;font-weight:600;margin-bottom:2px;">Canvas LMS</div>
          <div style="font-size:0.78rem;color:var(--text-muted);">Connect with your access token</div>
        </div>
        <div style="margin-left:auto;color:var(--text-muted);">→</div>
      </a>
      <a href="/login/studentvue" style="display:flex;align-items:center;gap:14px;padding:16px 20px;border-radius:14px;border:1px solid var(--border);background:var(--bg-card);text-decoration:none;color:var(--text-primary);box-shadow:var(--shadow);transition:all 0.2s;"
        onmouseover="this.style.borderColor='#22c55e'" onmouseout="this.style.borderColor='var(--border)'">
        <div style="width:42px;height:42px;border-radius:10px;background:#16a34a;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">🟩</div>
        <div>
          <div style="font-size:0.95rem;font-weight:600;margin-bottom:2px;">StudentVue</div>
          <div style="font-size:0.78rem;color:var(--text-muted);">Connect with district credentials</div>
        </div>
        <div style="margin-left:auto;color:var(--text-muted);">→</div>
      </a>
      <a href="/login/schoology" style="display:flex;align-items:center;gap:14px;padding:16px 20px;border-radius:14px;border:1px solid var(--border);background:var(--bg-card);text-decoration:none;color:var(--text-primary);box-shadow:var(--shadow);transition:all 0.2s;"
        onmouseover="this.style.borderColor='#5865F2'" onmouseout="this.style.borderColor='var(--border)'">
        <div style="width:42px;height:42px;border-radius:10px;background:#5865F2;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">🟦</div>
        <div>
          <div style="font-size:0.95rem;font-weight:600;margin-bottom:2px;">Schoology</div>
          <div style="font-size:0.78rem;color:var(--text-muted);">API key required · <span style="color:var(--high);font-weight:600;">not recommended</span></div>
        </div>
        <div style="margin-left:auto;color:var(--text-muted);">→</div>
      </a>
    </div>
    <div style="text-align:center;">
      <a href="/schedule" style="font-size:0.82rem;color:var(--text-muted);text-decoration:none;">Skip for now →</a>
    </div>
  </div>
</div>
{% endblock %}
