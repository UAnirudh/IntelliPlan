{% extends "base.html" %}

{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-icon" style="width:48px;height:48px;font-size:24px;margin:0 auto 1rem;">🟧</div>
      <h1 class="login-title">Sign in with Schoology</h1>
      <p class="login-subtitle">Connect your Schoology account using API credentials</p>
    </div>

    {% if error %}
    <div class="login-error">⚠️ {{ error }}</div>
    {% endif %}

    <form class="login-form" method="POST" action="/login/schoology">
      <div class="form-group">
        <label class="form-label">Profile Name</label>
        <input type="text" name="profile_name" class="form-input" placeholder="e.g. School Schoology" />
        <span class="form-hint">Optional label for this account</span>
      </div>
      <div class="form-group">
        <label class="form-label">API Key</label>
        <input type="text" name="api_key" class="form-input" placeholder="Your Schoology API key" />
        <span class="form-hint">Found in Schoology → Settings → API Access</span>
      </div>
      <div class="form-group">
        <label class="form-label">API Secret</label>
        <input type="password" name="api_secret" class="form-input" placeholder="••••••••••••••••" />
      </div>
      <button type="submit" class="btn-primary" style="width:100%;padding:14px;border:none;cursor:pointer;font-size:0.95rem;">
        Connect Schoology
      </button>
    </form>

    <div class="login-footer">
      <p><a href="/login" class="login-link">← Back to login options</a></p>
    </div>
  </div>
</div>
{% endblock %}
