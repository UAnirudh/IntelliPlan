{% extends "base.html" %}
{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-icon" style="width:48px;height:48px;font-size:24px;margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;overflow:hidden;border-radius:12px;">
        <img src="/static/icons/icon-192.png" style="width:100%;height:100%;object-fit:cover;">
      </div>
      <h1 class="login-title">Create your account</h1>
      <p class="login-subtitle">Free forever. No credit card needed.</p>
    </div>
    {% if error %}
    <div class="login-error">⚠️ {{ error }}</div>
    {% endif %}
    <form class="login-form" method="POST" action="/register">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-input" placeholder="you@school.edu" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="At least 8 characters" required />
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm_password" class="form-input" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-primary" style="width:100%;padding:14px;border:none;cursor:pointer;font-size:0.95rem;">
        Create Account →
      </button>
    </form>
    <div class="login-footer">
      <p>Already have an account? <a href="/login/account" class="login-link">Sign in</a></p>
      <p style="margin-top:6px;"><a href="/login" class="login-link">← Back to login options</a></p>
    </div>
  </div>
</div>
{% endblock %}
